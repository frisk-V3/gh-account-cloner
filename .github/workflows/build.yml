name: Build Linux GUI App (No SDK Needed Locally)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Linux GUI dependencies
        run: |
          sudo apt update
          sudo apt install -y libgl1-mesa-dev xorg-dev

      - name: Create go.mod automatically
        run: |
          if [ ! -f go.mod ]; then
            echo "go.mod not found. Creating..."
            go mod init gh-account-cloner
          fi
          go mod tidy

      - name: Build Linux binary
        run: |
          go build -o gh-account-cloner-gui ./cmd/gui

      - name: Upload artifact (Linux binary)
        uses: actions/upload-artifact@v4
        with:
          name: gh-account-cloner-linux
          path: gh-account-cloner-gui
          retention-days: 7
